<div class="slides-container">
  <!-- Slides viewport -->
  <div class="slides-viewport">
    <div
      *ngFor="let slide of slides"
      class="slide"
      [class.active]="slide.id === current"
      [class.exit-left]="slide.id === prev && direction === 'left'"
      [class.exit-right]="slide.id === prev && direction === 'right'"
      [class.enter-left]="
        slide.id === current && direction === 'left' && animating
      "
      [class.enter-right]="
        slide.id === current && direction === 'right' && animating
      "
    >
      <div class="slide-icon">{{ slide.icon }}</div>
      <div class="slide-content">
        <h3 class="slide-title">{{ slide.title }}</h3>
        <p class="slide-body" [class.contact-body]="slide.type === 'contact'">
          {{ slide.body }}
        </p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="slides-controls">
    <button class="arrow-btn" (click)="onPrev()">‹</button>

    <div class="dots">
      <span
        *ngFor="let slide of slides"
        class="dot"
        [class.active]="slide.id === current"
        (click)="onDot(slide.id)"
      >
      </span>
    </div>

    <button class="arrow-btn" (click)="onNext()">›</button>
  </div>
</div>
